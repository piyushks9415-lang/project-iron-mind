<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-Conditions</title>
</head>

<body>
    <!-- Computers make decisions using conditions. -->

    <!-- 
    
    if Shop is open
        show Open;
    else
        show Closed;

    --->

    <h2>Hello Everyone! Here we are going to learn Conditions in JS.</h2>

    <button onclick="checkShop()">Shop Status</button>

    <button onclick="result()">Result</button>
    <script>

//Practice: 

        function result() {
            percentage = prompt("Enter you total percentage: ");

            if (percentage<1) {
                console.log("Invalid Input!❌ Must be greater than or equal to 1");
            }
            else if(percentage>100){
                console.log("Invalid Input!❌ Must be less than or equal to 100");
            }
            else if(percentage>=33){
                alert("Congratulations! You are passed.😎")
            }
            else{
                alert("You are failed!😥")
            }

        }

//Challenge: 

        function checkShop() {

            let shopStatus = prompt("Enter the Shop Status(0/1): ");

            if (shopStatus == true) {
                alert("The shop is open!");
            }
            else if(shopStatus == false) {
                alert("The shop is closed!");
            }
            else{
                alert("Invalid Input!");
            }
        }
    </script>

</body>

</html>
