<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Intro</title>
</head>
<style>
    body {
        background-color: darkgreen;
    }

    h3 {
        color: white;
        font-weight: bolder;
        font-style: oblique;
    }

    button {
        border: 2px solid black;
        border-radius: 20px;
        color: white;
        background-color: darkcyan;
        margin: 2px 3px;
        padding: 10px 20px;
        font-size: large;
        font-style: italic;
        font-family: cursive;
    }
</style>

<body>
    <h3>Hello World!</h3>
    <button onclick="showMessage()">Shop Status</button>
    <button onclick="callUser()">Click Me</button>
</body>
<script>

    function showMessage() {
        alert("The shop is open between 9:00 AM to 5:00 PM!")
    }


    // Practice...

    function callUser() {
        alert("Hey! Welcome to my tool.")
    }

</script>

</html>
